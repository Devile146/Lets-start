<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Technical Fahad Web</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Roboto:wght@400&family=Black+Ops+One&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0d1117;
      color: #fff;
      font-family: 'Roboto', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px 12px;
      width: 100%;
    }

    /* main container — everything centered, fits 360px */
    .app-wrapper {
      width: 100%;
      max-width: 360px;          /* fixed at 360px */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      margin: 0 auto;
    }

    /* WHATSAPP BAN TOOL BOX */
    .tool-box {
      width: 100%;
      max-width: 340px;          /* slightly less than 360 for breathing */
      padding: 14px 0;
      margin-bottom: 14px;
      font-size: 2.1em;          /* scaled for 360px */
      font-weight: bold;
      color: #00ff7f;
      border: 3px solid #00ff7f;
      border-radius: 20px;
      background: rgba(0, 255, 127, 0.05);
      text-align: center;
      box-shadow: 0 0 35px rgba(0, 255, 127, 0.6), 0 0 60px rgba(0, 255, 127, 0.3);
      letter-spacing: 0.5px;
      word-break: break-word;
    }

    /* TOP NAME */
    .intro-box {
      width: 100%;
      text-align: center;
      margin-bottom: 10px;
    }
    .intro-box .intro {
      font-family: 'Orbitron', sans-serif;
      font-size: 2.6em;          /* scaled for 360px */
      color: #00ffff;
      letter-spacing: 2px;
      text-shadow: 0 0 20px #00ffff, 0 0 40px #00b3b3;
      font-weight: normal;
      word-break: break-word;
      line-height: 1.2;
    }

    /* CONTACT BUTTON — centered, small, perfect */
    .contact-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 140px;              /* fixed width for 360px */
      max-width: 80%;
      padding: 12px 0;
      margin: 18px 0 10px 0;
      background: linear-gradient(45deg, #FF06FFFF, #FFFF00E6);
      color: #fff;
      text-decoration: none;
      border-radius: 60px;
      font-size: 1.5em;          /* 24px approx */
      font-weight: bold;
      height: 50px;              /* consistent height */
      box-shadow: 0 0 20px #ff8c00, 0 0 40px #ff3c00;
      transition: transform 0.3s, box-shadow 0.3s;
      border: none;
      cursor: pointer;
      text-align: center;
    }
    .contact-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 40px #ff8c00, 0 0 70px #ff3c00;
    }

    /* ABOUT */
    .about {
      font-size: 1.2em;          /* scaled */
      margin: 6px 0 20px 0;
      text-align: center;
      color: #b0b0b0;
      width: 100%;
      word-break: break-word;
      padding: 0 6px;
    }

    /* SCRIPT BOXES — container */
    .script-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;                 /* reduced gap for 360px */
      width: 100%;
      margin: 6px 0 10px 0;
    }

    .script-box {
      width: 280px;              /* fixed width for 360px screen */
      max-width: 92%;
      height: 150px;             /* smaller height */
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.5em;          /* 24px approx */
      font-weight: bold;
      color: #fff;
      border-radius: 35px;
      cursor: pointer;
      border: 3px solid rgba(255, 255, 255, 0.2);
      background: transparent;
      text-align: center;
      transition: transform 0.3s, box-shadow 0.2s;
      text-decoration: none;
      padding: 0 8px;
      word-break: break-word;
      line-height: 1.2;
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.15);
    }

    /* individual neon glows (same as before) */
    .script-box:nth-child(1) { box-shadow: 0 0 25px #ff4b2b, 0 0 50px #ff512f; }
    .script-box:nth-child(2) { box-shadow: 0 0 25px #00c6ff, 0 0 50px #0072ff; }
    .script-box:nth-child(3) { box-shadow: 0 0 25px #8e2de2, 0 0 50px #4a00e0; }
    .script-box:nth-child(4) { box-shadow: 0 0 25px #feda75, 0 0 50px #ff7e5f; }
    .script-box:nth-child(5) { box-shadow: 0 0 25px #00ff88, 0 0 50px #009966; }
    .script-box:nth-child(6) { box-shadow: 0 0 25px #ee0979, 0 0 50px #ff6a00; }
    .script-box:nth-child(7) { box-shadow: 0 0 25px #8e2de2, 0 0 50px #4a00e0; }
    .script-box:nth-child(8) { box-shadow: 0 0 25px #feda75, 0 0 50px #ff7e5f; }
    .script-box:nth-child(9) { box-shadow: 0 0 25px #00c6ff, 0 0 50px #0072ff; }
    .script-box:nth-child(10) { box-shadow: 0 0 25px #00ff88, 0 0 50px #009966; }

    .script-box:hover {
      transform: scale(1.05);
    }

    /* ——— HOW TO USE BUTTON REMOVED ——— */
    /* no .how-to-use styles, no element */

    /* JOIN WHATSAPP BUTTON (last) */
    .whatsapp-btn {
      margin-top: 18px;
      padding: 14px 28px;        /* smaller padding for 360px */
      background: linear-gradient(135deg, #25D366, #128C7E);
      color: #fff;
      font-size: 1.3em;
      border-radius: 40px;
      text-decoration: none;
      display: inline-block;
      box-shadow: 0 0 20px rgba(37, 211, 102, 0.4);
      transition: transform 0.3s;
      text-align: center;
      width: auto;
      min-width: 200px;
      max-width: 90%;
      font-weight: bold;
      letter-spacing: 0.5px;
      border: none;
      cursor: pointer;
    }
    .whatsapp-btn:hover {
      transform: scale(1.04);
    }

    /* FOOTER */
    .footer-text {
      margin-top: 24px;
      font-size: 0.85em;
      color: #FFD700;
      text-align: center;
      width: 100%;
      letter-spacing: 0.5px;
      padding-bottom: 8px;
    }

    /* small extra spacing */
    .spacer-8 {
      height: 8px;
    }

    /* ensure all boxes scale nicely inside 360px */
    @media (max-width: 400px) {
      .tool-box { font-size: 1.8em; padding: 12px 0; }
      .intro-box .intro { font-size: 2.2em; }
      .contact-btn { width: 130px; height: 46px; font-size: 1.3em; }
      .about { font-size: 1.0em; }
      .script-box { width: 260px; height: 130px; font-size: 1.3em; }
      .whatsapp-btn { font-size: 1.1em; padding: 12px 20px; min-width: 160px; }
    }

    @media (max-width: 360px) {
      .tool-box { font-size: 1.6em; }
      .intro-box .intro { font-size: 2.0em; }
      .script-box { width: 230px; height: 120px; font-size: 1.2em; }
      .contact-btn { width: 110px; height: 40px; font-size: 1.1em; }
      .whatsapp-btn { font-size: 1.0em; padding: 10px 16px; min-width: 140px; }
    }
  </style>
</head>
<body>
  <div class="app-wrapper">

    <!-- WHATSAPP BAN TOOL BOX (TOP) -->
    <div class="tool-box">WHATSAPP BAN TOOL</div>

    <!-- TOP NAME -->
    <div class="intro-box"><div class="intro">TECHNICAL FAHAD</div></div>

    <!-- CONTACT BUTTON (no "HOW TO USE" above it) -->
    <a class="contact-btn" href="https://wa.me/923251138959" target="_blank">CONTACT</a>

    <!-- ABOUT -->
    <div class="about">A Professional Developer & Script Creator</div>

    <!-- SCRIPT BOXES (10 boxes) -->
    <div class="script-container">
      <a class="script-box" href="" target="_blank">SCRIPT 1</a>
      <a class="script-box" href="" target="_blank">SCRIPT 2</a>
      <a class="script-box" href="" target="_blank">SCRIPT 3</a>
      <a class="script-box" href="" target="_blank">SCRIPT 4</a>
      <a class="script-box" href="" target="_blank">SCRIPT 5</a>
      <a class="script-box" href="" target="_blank">SCRIPT 6</a>
      <a class="script-box" href="" target="_blank">SCRIPT 7</a>
      <a class="script-box" href="" target="_blank">SCRIPT 8</a>
      <a class="script-box" href="" target="_blank">SCRIPT 9</a>
      <a class="script-box" href="" target="_blank">BAN OP</a>
    </div>

    <!-- SPACER (since HOW TO USE is removed) -->
    <div style="height:6px;"></div>

    <!-- JOIN WHATSAPP BUTTON (LAST, WIDE) -->
    <a class="whatsapp-btn" href="https://whatsapp.com/channel/0029VbCK8wI96H4WL0Ds5n24" target="_blank">JOIN OUR WHATSAPP</a>

    <!-- FOOTER -->
    <div class="footer-text">2026 TECHNICAL_FAHAD</div>

  </div>

  <!-- FLOATING SCRIPT BOXES (same as original) -->
  <script>
    document.querySelectorAll('.script-box').forEach(box => {
      let amplitude = Math.random() * 20 + 10;
      let speed = Math.random() * 0.03 + 0.01;
      let pos = 0;
      let dir = 1;
      function float() {
        pos += dir * speed * 100;
        if (pos > amplitude) dir = -1;
        if (pos < -amplitude) dir = 1;
        box.style.transform = `translateY(${pos}px)`;
        requestAnimationFrame(float);
      }
      float();
    });
  </script>
</body>
  </html>
